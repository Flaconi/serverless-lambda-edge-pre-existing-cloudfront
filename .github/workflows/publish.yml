---
    name: Publish Node
    on:
      workflow_call:
        inputs:
          version:
            default: ''
            type: string
            required: false
          branch:
            default: master
            type: string
            required: false
          pre_release:
            default: false
            type: boolean
            description: is it a pre release run
          yarn_command_post_version:
            type: string
            required: false
            description: optional yarn command to run after a version in package.json was set
    
    jobs:
      publish:
        timeout-minutes: 10
        runs-on: ubuntu-24.04
        # do not publish again if the push came from the bot-shop-ci, also don't publish if the branch is not the default branch and it is a dependabot action, as otherwise the branch can not be merged automatically
        # master will be still published
        if: (github.event.pusher.name != 'bot-shop-ci' && github.actor != 'dependabot[bot]')
          || (github.actor == 'dependabot[bot]' &&  endsWith(github.ref,github.event.repository.default_branch))
        permissions:
          contents: write
          id-token: write
        steps:
          - uses: actions/checkout@v5
            with:
              show-progress: false
          - name: Set output
            id: vars
            shell: bash
            run: |
              if [[ "${{inputs.version}}" != "" ]]; then
                echo "tag=${{inputs.version}}" >> "$GITHUB_OUTPUT"
              else
                echo "tag=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"
              fi
          - name: Import GPG key
            id: import_gpg
            uses: crazy-max/ghaction-import-gpg@v6.3.0
            with:
              gpg_private_key: ${{ secrets.GPG_BOT_PRIVATE_KEY }}
              git_user_signingkey: true
              git_commit_gpgsign: true
          - uses: actions/setup-node@v6
            with:
              node-version: "20"
              cache: 'yarn'
          - run: yarn install --immutable
          - name: Set version to release tag 📝
            id: releaseVersion
            shell: bash
            run: |
                version=$(npm version --allow-same-version --no-commit-hooks --no-git-tag-version ${{ steps.vars.outputs.tag }})
                echo "version=${version#v}" >> $GITHUB_OUTPUT
                yarn ${{ inputs.yarn_command_post_version }}
          - name: Push version changes to main branch 📤
            uses: stefanzweifel/git-auto-commit-action@v7
            with:
                commit_message: 'chore: release ${{ steps.releaseVersion.outputs.version }}'
                branch: ${{ inputs.branch }}
                file_pattern: './package.json'
                commit_user_name: bot-shop-ci
                commit_user_email: bot-shop-ci@flaconi.de
                commit_author: bot-shop-ci <bot-shop-ci@flaconi.de>
                commit_options: --no-verify --signoff -S
          - name: Publish 🚀
            run: |
                # that forces that all releases of npm packages are done via oidc token
                yarn config unset npmAuthToken
                if [[ "${{inputs.pre_release}}" == "true" ]]; then
                    yarn npm publish --tag beta
                else
                    yarn npm publish
                fi
            shell: bash
